<!-- adminlogin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - MoodMatch</title>
  <link rel="stylesheet" href="style/auth.css" />
  <!-- Add icon library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .login-box {
      background-color: #1f2937;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 400px;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #facc15;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
    }

    .login-box button {
      width: 100%;
      background: linear-gradient(to right, #f59e0b, #ef4444);
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .login-box button:hover {
      background: linear-gradient(to right, #d97706, #dc2626);
    }

    .login-box p {
      text-align: center;
      margin-top: 10px;
    }

    .login-box a {
      color: #facc15;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .login-box a:hover {
      text-decoration: underline;
    }
    .top-btn {
      background: #a78bfa;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top-btn:hover {
      background: #f472b6;
    }
    .home-icon {
      width: 24px;
      height: 24px;
      display: inline-block;
      vertical-align: middle;
      fill: #a78bfa;
      transition: fill 0.2s;
    }
    .top-btn:hover .home-icon {
      fill: #f472b6;
    }
    .btn-home {
      background-color: #a78bfa;
      border: none;
      color: #fff;
      padding: 12px 16px;
      font-size: 20px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(167,139,250,0.15);
      transition: background 0.2s, color 0.2s;
    }
    .btn-home:hover {
      background-color: #f472b6;
      color: #facc15;
    }
    .btn-user {
      background-color: #60a5fa;
      color: #fff;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-user:hover {
      background-color: #a78bfa;
      color: #fff700;
    }
  </style>
</head>
<body>
  <div style="position: absolute; top: 20px; left: 40px;">
    <button class="btn-home" onclick="window.location.href='index.html'"><i class="fa fa-home"></i></button>
  </div>
  <div style="position: absolute; top: 20px; right: 40px;">
    <button class="btn-user" onclick="window.location.href='userlogin.html'">User Login</button>
  </div>
  <div class="login-box">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <input type="text" name="username" placeholder="Admin Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p><a href="index.html">← Back to Home</a></p>
  </div>

  <script>
    document.getElementById("adminLoginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = document.querySelector("input[name='username']").value;
      const password = document.querySelector("input[name='password']").value;

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("adminUsername", username);
          alert("Admin login successful!");
          window.location.href = "admin.html"; // Replace with your admin page
        } else {
          alert(data.message || "Login failed");
        }
      } catch (err) {
        console.error("Admin login error:", err);
        alert("Something went wrong.");
      }
    });
  </script>
</body>
</html>
