<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - MoodMatch</title>
  <link rel="stylesheet" href="style/admin.css" />
  <style>
    h1, h2 {
      text-align: center;
      color: #facc15;
    }

    .section {
      margin-top: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table, th, td {
      border: 1px solid #555;
    }

    th, td {
      padding: 12px;
      text-align: center;
      background-color: #1f2937;
    }

    th {
      background-color: #111827;
      color: #facc15;
    }

    .btn-deactivate, .btn-delete {
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn-deactivate {
      background-color: #f59e0b;
      color: #fff;
    }

    .btn-delete {
      background-color: #ef4444;
      color: #fff;
    }

    .btn-deactivate:hover {
      background-color: #d97706;
    }

    .btn-delete:hover {
      background-color: #dc2626;
    }
    
    .unauthorized-message {
      display: none;
      text-align: center;
      margin-top: 100px;
      color: red;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div id="unauthorized" class="unauthorized-message">
    <h2>Unauthorized Access</h2>
    <p>Please <a href="adminlogin.html">login</a> as an administrator to access this page.</p>
  </div>

  <div id="admin-content" class="admin-container">
    <h1>MoodMatch Admin Panel</h1>

    <!-- User Management Table -->
    <div class="section">
      <h2>User Management</h2>
      <table id="userTable">
        <thead>
          <tr>
            <th>Username</th>
            <th>Status</th>
            <th>Deactivate</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody>
          <!-- Populated via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Force reload on back/forward navigation to prevent cached access after logout
    window.addEventListener("pageshow", function(event) {
      if (event.persisted) {
        window.location.reload();
      }
    });
  </script>
  <script src="scripts/admin.js"></script>
</body>
</html>
