<!-- userlogin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login - MoodMatch</title>
  <link rel="stylesheet" href="style/auth.css" />
  <!-- Add icon library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .btn-home {
      background-color: #a78bfa;
      border: none;
      color: #fff;
      padding: 12px 16px;
      font-size: 20px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(167,139,250,0.15);
      transition: background 0.2s, color 0.2s;
    }
    .btn-home:hover {
      background-color: #f472b6;
      color: #facc15;
    }
    .btn-admin {
      background-color: #60a5fa;
      color: #fff;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-admin:hover {
      background-color: #a78bfa;
      color: #fff700;
    }
  </style>
</head>
<body>
  <div style="position: absolute; top: 20px; left: 40px;">
    <button class="btn-home" onclick="window.location.href='index.html'"><i class="fa fa-home"></i></button>
  </div>
  <div style="position: absolute; top: 20px; right: 40px;">
    <button class="btn-admin" onclick="window.location.href='adminlogin.html'">Admin Login</button>
  </div>
  <div class="login-box">
    <h2>User Login</h2>
    <form id="userLoginForm">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
  </div>

  <script>
    document.getElementById("userLoginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const username = document.querySelector("input[name='username']").value;
      const password = document.querySelector("input[name='password']").value;

      try {
        const res = await fetch("/api/users/login", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ username, password })
});

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("userId", data.userId);
          localStorage.setItem("username", username);  // Save user ID to localStorage
          alert("Login successful!");
          window.location.href = "userdashboard.html"; // Redirect to homepage or dashboard
        } else {
          alert(data.message || "Login failed.");
        }
      } catch (err) {
        console.error("Login error:", err);
        alert("Something went wrong. Please try again.");
    }
    });
  </script>
</body>
</html>
